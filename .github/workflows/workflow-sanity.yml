name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 第一步：编译核心 (这是必须用 pnpm 的部分)
      - name: Compile Core
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
          
      # 第二步：【战略大支点】搬家到干净目录，彻底甩掉 pnpm 的纠缠
      - name: Move to Clean Workspace
        shell: pwsh
        run: |
          mkdir ../portable-package
          # 只把我们需要的东西：package.json, bin, dist, 以及关键的各种入口文件考走
          Copy-Item -Path "package.json", "openclaw.mjs", "dist" -Destination "../portable-package/" -Recurse -Force
          # 尝试捞取子模块编译出的内容
          Copy-Item -Path "apps/*/dist/*" -Destination "../portable-package/dist/" -ErrorAction SilentlyContinue

      # 第三步：在干净目录里，用 npm 手动灌入“实心”依赖
      - name: Install Flat Dependencies
        shell: pwsh
        run: |
          cd ../portable-package
          # 彻底禁用 pnpm，改用 npm 安装生产环境依赖
          # npm install 生成的一定是包含真实代码的文件夹
          npm install --omit=dev --no-package-lock --legacy-peer-deps

      # 第四步：【死磕自检】如果文件夹还是空的，直接让 GitHub 炸掉，不让你下错
      - name: Hard Self-Check
        shell: pwsh
        run: |
          cd ../portable-package
          Write-Host "Checking Chalk folder..."
          if (!(Test-Path "node_modules/chalk/index.js")) {
             Write-Error "CRITICAL FAILURE: The folder is STILL EMPTY! Stopping build."
             exit 1
          }
          Write-Host "Victory! Real files detected."

      # 第五步：打包那个“干净、实心”的新文件夹
      - name: Create Final Zip
        shell: pwsh
        run: |
          cd ../portable-package
          Compress-Archive -Path "*" -DestinationPath "../openclaw_proper_offline.zip" -Force
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-REAL-OFFLINE
          path: openclaw_proper_offline.zip
