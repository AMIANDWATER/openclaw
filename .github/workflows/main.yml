name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. 安装 pnpm 并在底层强制禁用链接模式
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 2. 设置真正的平铺模式 (这是解决报错的关键)
      - name: Config Pnpm Linker
        run: |
          pnpm config set node-linker hoisted
          pnpm config set shamefully-hoist true

      # 3. 安装依赖（现在会下载真实文件到 node_modules）
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile
          
      # 4. 构建核心代码
      - name: Build Project
        run: pnpm run build
            
      # 5. 打包生成真正的绿色离线包
      - name: Create Zip Package
        shell: pwsh
        run: |
          # 验证 chalk 等包是否存在，确保这次真的有文件了
          if (Test-Path "node_modules/chalk") { Write-Host "Chalk exists!" }
          
          $exclude = @(".git", ".github", "openclaw_windows.zip")
          Get-ChildItem -Exclude $exclude | Compress-Archive -DestinationPath "openclaw_windows.zip" -Force
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-offline
          path: openclaw_windows.zip
