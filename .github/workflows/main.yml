name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies (Flat Mode)
        # 这里非常重要：强制把所有依赖平铺，不使用链接
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile
          
      - name: Build Project
        run: pnpm run build
            
      - name: Finalize node_modules for Portable
        # 这一步能确保打包进去的是真正的文件夹，而不是失效的链接
        run: |
          pnpm install --prod --no-frozen-lockfile

      - name: Create Zip Package
        shell: pwsh
        run: |
          # 排除掉不需要的源码，只留核心和依赖，减小体积并确保可用
          $exclude = @(".git", ".github", "openclaw_windows.zip")
          Get-ChildItem -Exclude $exclude | Compress-Archive -DestinationPath "openclaw_windows.zip" -Force
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-offline
          path: openclaw_windows.zip
