name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. 安装 pnpm (项目强依赖它)
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          
      # 2. 设置 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 3. 使用 pnpm 安装依赖
      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          
      # 4. 执行项目构建 (生成 bin 和 dist 目录)
      - name: Build Project
        run: pnpm run build
            
      # 5. 打包生成 Windows 离线大礼包
      - name: Create Zip Package
        shell: pwsh
        run: |
          # 排除无用目录，打包核心文件和所有依赖
          $exclude = @(".git", ".github", "openclaw_windows.zip")
          Get-ChildItem -Exclude $exclude | Compress-Archive -DestinationPath "openclaw_windows.zip" -Force
            
      # 6. 上传可供下载的文件
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-offline
          path: openclaw_windows.zip
