name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        # 强制安装所有依赖，忽略可能的冲突
        run: |
          npm install --force
          
      - name: Build Project (If exists)
        # 如果项目中有编译脚本（如生成 dist 或 bin），则执行它
        run: npm run build --if-present
            
      - name: Create Zip Package
        shell: pwsh
        run: |
          # 1. 查找依赖是否安装成功
          ls node_modules
          # 2. 打包所有文件（排除临时文件和 git 记录）
          $exclude = @(".git", ".github", "openclaw_windows.zip")
          Get-ChildItem -Exclude $exclude | Compress-Archive -DestinationPath "openclaw_windows.zip" -Force
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-offline
          path: openclaw_windows.zip
