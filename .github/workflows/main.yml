name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1. 编译阶段：使用 pnpm 编译出核心 dist 文件
      - name: Build Core
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
          
      # 2. 关键补救：彻底铲除 pnpm 的软链接依赖
      - name: Wipe Symlinks
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force node_modules
          # 确保删除 pnpm 的锁文件，防止 npm 报错
          Remove-Item -Force pnpm-lock.yaml

      # 3. 部署阶段：使用 npm 强制平铺所有“真实文件”
      - name: Flatten Dependencies (Real Files Only)
        run: |
          # 使用 npm 专门安装生产环境依赖，生成的文件夹都是实物
          npm install --omit=dev --no-package-lock --legacy-peer-deps

      # 4. 目录校正：把子模块的文件捞出来放进根目录
      - name: Collect Assets
        shell: pwsh
        run: |
          if (!(Test-Path "dist")) { mkdir dist }
          # 如果 apps/cli 下有生成的 dist，强制复制到根目录
          if (Test-Path "apps/cli/dist") { Copy-Item -Path "apps/cli/dist/*" -Destination "dist/" -Recurse -Force }

      # 5. 打包验证：检查核心包是否存在
      - name: Verify and Package
        shell: pwsh
        run: |
          if (!(Test-Path "node_modules/chalk/package.json")) { throw "CRITICAL: chalk is still missing!" }
          if (!(Test-Path "dist/entry.js")) { throw "CRITICAL: dist/entry.js is missing!" }
          
          # 打包所有实物文件夹
          $exclude = @(".git", ".github", "openclaw_windows.zip")
          Get-ChildItem -Exclude $exclude | Compress-Archive -DestinationPath "openclaw_windows.zip" -Force
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-offline
          path: openclaw_windows.zip
