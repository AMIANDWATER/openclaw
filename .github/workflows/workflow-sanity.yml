name: Build-Windows-Package
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1. 第一步：正常安装并编译
      - name: Build Core
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      # 2. 第二步：【降维打击】使用 pnpm deploy 抽离出一个纯净、实体的运行环境
      # 我们假设核心模块在 apps/cli，如果不是，它会尝试寻找其他 apps
      - name: Deploy Portable Folder
        shell: pwsh
        run: |
          # 尝试找到核心 package 的名字 (通常是 openclaw 或 @openclaw/cli)
          $pkgName = (Get-Content "package.json" | ConvertFrom-Json).name
          Write-Host "Deploying package: $pkgName"
          
          # 这个命令是专门为了“移动到其他机器运行”设计的，它会自动处理所有依赖并转为实体文件
          # 我们把结果部署到 ../portable-dist
          pnpm --filter "$pkgName" deploy --prod ../portable-dist

      # 3. 第三步：补全 dist 编译产物
      # 部署命令有时只考源码，我们需要把刚编译好的核心 dist 强行塞进去
      - name: Sync Compiled Files
        shell: pwsh
        run: |
          Copy-Item -Path "dist", "openclaw.mjs", "bin" -Destination "../portable-dist/" -Recurse -Force -ErrorAction SilentlyContinue
          # 强制把所有 apps 下的编译产物都搜刮干净
          Get-ChildItem -Path "apps/*/dist/*" -ErrorAction SilentlyContinue | Copy-Item -Destination "../portable-dist/dist/" -Force

      # 4. 第四步：【硬核检查】如果在部署后的 node_modules 里还找不到 chalk，脚本会立刻自毁（红色报错）
      - name: Hard Verification
        shell: pwsh
        run: |
          cd ../portable-dist
          Write-Host "Verifying real files in node_modules..."
          if (!(Test-Path "node_modules/chalk/package.json")) {
             Write-Error "STILL EMPTY! pnpm deploy failed to manifest files."
             exit 1
          }
          Write-Host "SUCCESS: Real files are present!"

      # 5. 第五步：打包那个绝对真实的文件夹
      - name: Final Zip
        shell: pwsh
        run: |
          cd ../portable-dist
          Compress-Archive -Path "*" -DestinationPath "../OpenClaw_Absolute_Offline.zip" -Force
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw_FINAL_RESULT
          path: OpenClaw_Absolute_Offline.zip
